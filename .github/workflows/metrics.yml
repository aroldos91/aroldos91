name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Se actualiza cada medianoche (UTC)
  workflow_dispatch: # Permite ejecutarlo manualmente
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: aroldos91
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Havana
          repositories_batch: 200

          # Lenguajes reales (incluye repos privados gracias al PAT)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css # Opcional: filtrar "ruido"

          # Calendario isométrico de contribuciones (medio año)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
